name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Publish shared-types
        run: npm publish --access public
        working-directory: packages/shared-types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish agent-core
        run: npm publish --access public
        working-directory: packages/agent-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish provider-mock
        run: npm publish --access public
        working-directory: packages/provider-mock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish provider-duffel
        run: npm publish --access public
        working-directory: packages/provider-duffel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
